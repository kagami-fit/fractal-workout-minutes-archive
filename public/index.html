<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FRACTAL WORKOUT Meeting Archive</title>
    <link rel="stylesheet" href="./styles.css?v=20260622-sidebar" />
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <aside class="sidebar" id="sidebar" aria-label="日付別アーカイブ">
        <div class="brand">
          <div>
            <img class="brand-logo" src="./brand/fractal-workout-logo-gray.png" alt="FRACTAL WORKOUT" />
            <p>FW MTG Archive</p>
          </div>
        </div>
        <div class="sidebar-header">
          <span>日付別</span>
          <div class="sidebar-actions">
            <button class="icon-button" id="sidebarToggle" type="button" aria-controls="sidebar" aria-expanded="true" aria-label="左側を閉じる" title="左側を閉じる">
              <span aria-hidden="true">‹</span>
            </button>
            <button class="icon-button" id="refreshButton" type="button" aria-label="更新" title="更新">↻</button>
          </div>
        </div>
        <nav id="archiveList" class="archive-list"></nav>
      </aside>

      <button class="sidebar-rail-toggle" id="sidebarRailToggle" type="button" aria-controls="sidebar" aria-expanded="true" aria-label="左側を閉じる" title="左側を閉じる">
        <span aria-hidden="true">☰</span>
      </button>

      <main class="workspace">
        <header class="archive-hero">
          <div>
            <p class="eyebrow">Meeting Minutes</p>
            <h2>FRACTAL WORKOUT 議事録アーカイブ</h2>
          </div>
          <p>FRACTAL WORKOUTの打ち合わせ議事録と図解を、日付ごとに見返せる共有ビューです。</p>
        </header>

        <section id="detailPane" class="detail-pane empty-state">
          <div class="empty-copy">
            <h2>議事録を選択</h2>
            <p>日付別アーカイブから選ぶと、要約・決定事項・アクション・図解を表示します。</p>
          </div>
        </section>
      </main>
    </div>

    <div class="image-lightbox" id="imageLightbox" hidden aria-hidden="true">
      <button class="lightbox-backdrop" type="button" data-lightbox-close aria-label="閉じる"></button>
      <figure class="lightbox-panel">
        <button class="lightbox-close" id="lightboxClose" type="button" aria-label="閉じる">×</button>
        <img id="lightboxImage" src="" alt="" />
      </figure>
    </div>

    <script src="./app.js?v=20260622-sidebar" type="module"></script>
  </body>
</html>
